<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Background -->
  <rect width="200" height="200" fill="none"/>

  <!-- Blue Triangle Left -->
  <polygon points="40,160 40,80 90,120" fill="url(#blueGradient)" opacity="0.9"/>

  <!-- Light Triangle Right -->
  <polygon points="160,160 160,80 110,120" fill="url(#silverGradient)" opacity="0.7"/>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ccff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ff00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Growth Curve -->
  <path d="M 50,140 Q 100,100 150,60" stroke="url(#greenGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Arrow Head -->
  <polygon points="150,55 158,48 145,60" fill="#99ff00"/>

  <!-- Bar Chart -->
  <rect x="60" y="125" width="8" height="25" fill="#0099ff" opacity="0.8"/>
  <rect x="72" y="115" width="8" height="35" fill="#00ccff" opacity="0.8"/>
  <rect x="84" y="105" width="8" height="45" fill="#00ff88" opacity="0.8"/>
  <rect x="96" y="95" width="8" height="55" fill="#66ff00" opacity="0.8"/>
  <rect x="108" y="85" width="8" height="65" fill="#99ff00" opacity="0.8"/>
</svg>