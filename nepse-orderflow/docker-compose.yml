version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: orderflow_postgres
    environment:
      POSTGRES_DB: orderflow_db
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - orderflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: orderflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - orderflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  fastapi:
    build: ./backend
    container_name: orderflow_fastapi
    environment:
      DATABASE_URL: postgresql://orderflow:orderflow123@postgres:5432/orderflow_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orderflow_network
    restart: unless-stopped

  # Data Collector with Order Flow Engine
  collector:
    build: ./collector
    container_name: orderflow_collector
    environment:
      DATABASE_URL: postgresql://orderflow:orderflow123@postgres:5432/orderflow_db
      REDIS_URL: redis://redis:6379
      COLLECTION_INTERVAL: 3
    volumes:
      - ./collector/session:/app/session
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orderflow_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: orderflow_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
    networks:
      - orderflow_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  orderflow_network:
    driver: bridge
