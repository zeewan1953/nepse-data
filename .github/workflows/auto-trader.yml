name: Auto Trader Market Hours

on:
  schedule:
    # NPT 11:00-15:00 = UTC 05:15-09:15 (Sun=0..Thu=4)
    # Run tick every 5 min during market hours
    - cron: "*/5 5,6,7,8,9 * * 0,1,2,3,4"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Trader Tick
        run: |
          HTTP_CODE=$(curl -s -o /tmp/tick-response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 60 \
            "https://nepse-data-sand.vercel.app/api/cron/auto-trader/tick")
          echo "HTTP $HTTP_CODE"
          cat /tmp/tick-response.json
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
